<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Assessment - HealthSense</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">HealthSense AI</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Dashboard</a>
            <a href="diabetes.html" class="nav-link active">Diabetes</a>
            <a href="heart.html" class="nav-link">Heart Disease</a>
        </div>
    </nav>

    <div class="container" style="max-width: 800px;">
        <header class="animate-in">
            <h1>Diabetes Risk Assessment</h1>
            <p class="text-muted">Enter your clinical parameters to evaluate risk probability using our advanced AI model.</p>
        </header>

        <div class="glass-card animate-in" style="margin-top: 2rem; animation-delay: 0.1s;">
            <form id="diabetesForm">
                <div class="grid">
                    <div class="form-group">
                        <label>Pregnancies</label>
                        <input type="number" id="pregnancies" required placeholder="0-17" min="0">
                    </div>
                    <div class="form-group">
                        <label>Glucose (mg/dL)</label>
                        <input type="number" id="glucose" required placeholder="44-199" min="0">
                    </div>
                    <div class="form-group">
                        <label>Blood Pressure (mm Hg)</label>
                        <input type="number" id="bp" required placeholder="24-122" min="0">
                    </div>
                    <div class="form-group">
                        <label>Skin Thickness (mm)</label>
                        <input type="number" id="skin" required placeholder="7-99" min="0">
                    </div>
                    <div class="form-group">
                        <label>Insulin (IU/mL)</label>
                        <input type="number" id="insulin" required placeholder="14-846" min="0">
                    </div>
                    <div class="form-group">
                        <label>BMI</label>
                        <input type="number" id="bmi" step="0.1" required placeholder="18.2-67.1" min="0">
                    </div>
                    <div class="form-group">
                        <label>Diabetes Pedigree</label>
                        <input type="number" id="pedigree" step="0.001" required placeholder="0.078-2.42" min="0">
                    </div>
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="age" required placeholder="21-81" min="0">
                    </div>
                </div>

                <div style="margin-top: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="saveToDB" checked style="width: auto;">
                    <label for="saveToDB" style="margin-bottom: 0;">Save prediction result for internal tracking</label>
                </div>

                <div style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem;">
                        <i class="bi bi-lightning-charge"></i> Analyze Risk
                    </button>
                </div>
            </form>

            <div id="loading" style="display: none; text-align: center; margin-top: 2rem;">
                <div style="width: 40px; height: 40px; border: 4px solid var(--primary); border-top-color: transparent; border-radius: 50%; display: inline-block; animation: spin 1s linear infinite;"></div>
                <p style="margin-top: 1rem;">Analyzing data against ML model...</p>
            </div>

            <div id="resultDisplay" class="result-display">
                <i id="resultIcon" class="bi" style="font-size: 4rem; margin-bottom: 1rem; display: block;"></i>
                <h2 id="resultTitle">Risk Assessment Result</h2>
                <div style="font-size: 3rem; font-weight: 800; margin: 1rem 0;" id="resultProb">0%</div>
                <p id="resultMessage" style="color: var(--text-muted); line-height: 1.6;"></p>
                <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
                    <button class="btn btn-primary" onclick="window.location.reload()">
                        <i class="bi bi-arrow-repeat"></i> New Analysis
                    </button>
                    <button class="btn" style="background: rgba(255, 255, 255, 0.05);" onclick="window.location.href='index.html'">
                        <i class="bi bi-house"></i> Go to Dashboard
                    </button>
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script src="js/api.js"></script>
    <script src="js/diabetes.js"></script>
</body>
</html>
