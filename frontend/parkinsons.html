<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkinson's Assessment - HealthSense</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">HealthSense AI</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Dashboard</a>
            <a href="diabetes.html" class="nav-link">Diabetes</a>
            <a href="heart.html" class="nav-link">Heart</a>
            <a href="parkinsons.html" class="nav-link active">Parkinson's</a>
            <a href="breast_cancer.html" class="nav-link">Breast Cancer</a>
        </div>
    </nav>

    <div class="container" style="max-width: 900px;">
        <header class="animate-in">
            <h1>Parkinson's Disease Risk Analysis</h1>
            <p class="text-muted">Enter biomedical voice measures and clinical data for an AI-assisted risk assessment.</p>
        </header>

        <div class="glass-card animate-in" style="margin-top: 2rem; animation-delay: 0.1s; background: rgba(99, 102, 241, 0.05); border-color: rgba(99, 102, 241, 0.2);">
            <form id="parkinsonsForm">
                <div class="grid">
                    <div class="form-group">
                        <label>Avg Fundamental Frequency (Hz)</label>
                        <input type="number" id="avg_f0" step="0.1" required placeholder="80-260" min="50">
                    </div>
                    <div class="form-group">
                        <label>Jitter (%)</label>
                        <input type="number" id="jitter" step="0.0001" required placeholder="0.001-0.03" min="0">
                    </div>
                    <div class="form-group">
                        <label>Shimmer</label>
                        <input type="number" id="shimmer" step="0.0001" required placeholder="0.01-0.12" min="0">
                    </div>
                    <div class="form-group">
                        <label>Noise-to-Harmonic (NHR)</label>
                        <input type="number" id="nhr" step="0.0001" required placeholder="0.001-0.3" min="0">
                    </div>
                    <div class="form-group">
                        <label>Harmonic-to-Noise (HNR)</label>
                        <input type="number" id="hnr" step="0.1" required placeholder="8-33" min="0">
                    </div>
                    <div class="form-group">
                        <label>RPDE (Entropy)</label>
                        <input type="number" id="rpde" step="0.001" required placeholder="0.2-0.7" min="0">
                    </div>
                    <div class="form-group">
                        <label>DFA (Scaling Exponent)</label>
                        <input type="number" id="dfa" step="0.001" required placeholder="0.5-0.8" min="0">
                    </div>
                    <div class="form-group">
                        <label>Spread 1</label>
                        <input type="number" id="spread1" step="0.01" required placeholder="-8 to -2" min="-15">
                    </div>
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="age" required placeholder="40-85" min="0">
                    </div>
                </div>

                <div style="margin-top: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="saveToDB" checked style="width: auto;">
                    <label for="saveToDB" style="margin-bottom: 0;">Save prediction result for tracking</label>
                </div>

                <div style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem;">
                        <i class="bi bi-activity"></i> Run Parkinson's Analysis
                    </button>
                </div>
            </form>

            <div id="loading" style="display: none; text-align: center; margin-top: 2rem;">
                <div style="width: 40px; height: 40px; border: 4px solid var(--primary); border-top-color: transparent; border-radius: 50%; display: inline-block; animation: spin 1s linear infinite;"></div>
                <p style="margin-top: 1rem;">Processing biomedical data...</p>
            </div>

            <div id="resultDisplay" class="result-display">
                <i id="resultIcon" class="bi" style="font-size: 4rem; margin-bottom: 1rem; display: block;"></i>
                <h2 id="resultTitle">Analysis Result</h2>
                <div style="font-size: 3rem; font-weight: 800; margin: 1rem 0;" id="resultProb">0%</div>
                <p id="resultMessage" style="color: var(--text-muted); line-height: 1.6;"></p>
                <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
                    <button class="btn btn-primary" onclick="window.location.reload()">
                        <i class="bi bi-arrow-repeat"></i> New Analysis
                    </button>
                    <button class="btn" style="background: rgba(255, 255, 255, 0.05);" onclick="window.location.href='index.html'">
                        <i class="bi bi-house"></i> Go to Dashboard
                    </button>
                </div>
            </div>
        </div>
    </div>

    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <script src="js/api.js"></script>
    <script src="js/parkinsons.js"></script>
</body>
</html>
