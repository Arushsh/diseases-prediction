<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breast Cancer Assessment - HealthSense</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">HealthSense AI</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Dashboard</a>
            <a href="diabetes.html" class="nav-link">Diabetes</a>
            <a href="heart.html" class="nav-link">Heart</a>
            <a href="parkinsons.html" class="nav-link">Parkinson's</a>
            <a href="breast_cancer.html" class="nav-link active">Breast Cancer</a>
        </div>
    </nav>

    <div class="container" style="max-width: 900px;">
        <header class="animate-in">
            <h1>Breast Cancer Risk Assessment</h1>
            <p class="text-muted">Enter diagnostic parameters from a fine needle aspirate (FNA) report for an AI-assisted risk analysis.</p>
        </header>

        <div class="glass-card animate-in" style="margin-top: 2rem; animation-delay: 0.1s; background: rgba(236, 72, 153, 0.05); border-color: rgba(236, 72, 153, 0.2);">
            <form id="bcForm">
                <div class="grid">
                    <div class="form-group">
                        <label>Radius (Mean)</label>
                        <input type="number" id="radius" step="0.01" required placeholder="6-28" min="0">
                    </div>
                    <div class="form-group">
                        <label>Texture (Mean)</label>
                        <input type="number" id="texture" step="0.01" required placeholder="9-39" min="0">
                    </div>
                    <div class="form-group">
                        <label>Perimeter (Mean)</label>
                        <input type="number" id="perimeter" step="0.01" required placeholder="43-188" min="0">
                    </div>
                    <div class="form-group">
                        <label>Area (Mean)</label>
                        <input type="number" id="area" step="0.1" required placeholder="143-2501" min="0">
                    </div>
                    <div class="form-group">
                        <label>Smoothness (Mean)</label>
                        <input type="number" id="smoothness" step="0.0001" required placeholder="0.05-0.16" min="0">
                    </div>
                    <div class="form-group">
                        <label>Compactness (Mean)</label>
                        <input type="number" id="compactness" step="0.0001" required placeholder="0.01-0.34" min="0">
                    </div>
                    <div class="form-group">
                        <label>Concavity (Mean)</label>
                        <input type="number" id="concavity" step="0.0001" required placeholder="0-0.42" min="0">
                    </div>
                    <div class="form-group">
                        <label>Concave Points (Mean)</label>
                        <input type="number" id="concave_points" step="0.0001" required placeholder="0-0.2" min="0">
                    </div>
                    <div class="form-group">
                        <label>Symmetry (Mean)</label>
                        <input type="number" id="symmetry" step="0.0001" required placeholder="0.1-0.3" min="0">
                    </div>
                    <div class="form-group">
                        <label>Fractal Dimension (Mean)</label>
                        <input type="number" id="fractal_dim" step="0.0001" required placeholder="0.05-0.1" min="0">
                    </div>
                </div>

                <div style="margin-top: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="saveToDB" checked style="width: auto;">
                    <label for="saveToDB" style="margin-bottom: 0;">Save prediction result for tracking</label>
                </div>

                <div style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem; background: linear-gradient(135deg, var(--secondary), var(--accent));">
                        <i class="bi bi-shield-plus"></i> Analyze Breast Cancer Risk
                    </button>
                </div>
            </form>

            <div id="loading" style="display: none; text-align: center; margin-top: 2rem;">
                <div style="width: 40px; height: 40px; border: 4px solid var(--secondary); border-top-color: transparent; border-radius: 50%; display: inline-block; animation: spin 1s linear infinite;"></div>
                <p style="margin-top: 1rem;">Analyzing diagnostic parameters...</p>
            </div>

            <div id="resultDisplay" class="result-display">
                <i id="resultIcon" class="bi" style="font-size: 4rem; margin-bottom: 1rem; display: block;"></i>
                <h2 id="resultTitle">Diagnostic Result</h2>
                <div style="font-size: 3rem; font-weight: 800; margin: 1rem 0;" id="resultProb">0%</div>
                <p id="resultMessage" style="color: var(--text-muted); line-height: 1.6;"></p>
                <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
                    <button class="btn btn-primary" onclick="window.location.reload()" style="background: linear-gradient(135deg, var(--secondary), var(--accent));">
                        <i class="bi bi-arrow-repeat"></i> New Analysis
                    </button>
                    <button class="btn" style="background: rgba(255, 255, 255, 0.05);" onclick="window.location.href='index.html'">
                        <i class="bi bi-house"></i> Go to Dashboard
                    </button>
                </div>
            </div>
        </div>
    </div>

    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <script src="js/api.js"></script>
    <script src="js/breast_cancer.js"></script>
</body>
</html>
