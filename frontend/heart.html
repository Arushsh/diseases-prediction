<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardiac Assessment - HealthSense</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">HealthSense AI</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Dashboard</a>
            <a href="diabetes.html" class="nav-link">Diabetes</a>
            <a href="heart.html" class="nav-link active">Heart Disease</a>
        </div>
    </nav>

    <div class="container" style="max-width: 900px;">
        <header class="animate-in">
            <h1>Cardiac Risk Assessment</h1>
            <p class="text-muted">Enter your cardiac health parameters for a comprehensive risk probability analysis.</p>
        </header>

        <div class="glass-card animate-in" style="margin-top: 2rem; animation-delay: 0.1s; background: rgba(236, 72, 153, 0.05); border-color: rgba(236, 72, 153, 0.2);">
            <form id="heartForm">
                <div class="grid">
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="age" required placeholder="29-77" min="0">
                    </div>
                    <div class="form-group">
                        <label>Sex</label>
                        <select id="sex" required>
                            <option value="">Select Gender</option>
                            <option value="1">Male</option>
                            <option value="0">Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Chest Pain Type (1-4)</label>
                        <input type="number" id="cp" required placeholder="1: typical, 2: atyp, 3: non, 4: asymp" min="1" max="4">
                    </div>
                    <div class="form-group">
                        <label>Resting Blood Pressure</label>
                        <input type="number" id="trestbps" required placeholder="94-200" min="0">
                    </div>
                    <div class="form-group">
                        <label>Cholesterol (mg/dL)</label>
                        <input type="number" id="chol" required placeholder="126-564" min="0">
                    </div>
                    <div class="form-group">
                        <label>Fasting Blood Sugar > 120 mg/dL</label>
                        <select id="fbs" required>
                            <option value="1">True (1)</option>
                            <option value="0">False (0)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Resting ECG (0-2)</label>
                        <input type="number" id="restecg" required placeholder="0: normal, 1: ST-T, 2: LVH" min="0" max="2">
                    </div>
                    <div class="form-group">
                        <label>Max Heart Rate</label>
                        <input type="number" id="thalach" required placeholder="60-202" min="0">
                    </div>
                    <div class="form-group">
                        <label>Exercise Induced Angina</label>
                        <select id="exang" required>
                            <option value="1">Yes (1)</option>
                            <option value="0">No (0)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Oldpeak (ST depression)</label>
                        <input type="number" id="oldpeak" step="0.1" required placeholder="0-6.2" min="0">
                    </div>
                    <div class="form-group">
                        <label>Slope (ST segment)</label>
                        <input type="number" id="slope" required placeholder="1: up, 2: flat, 3: down" min="1" max="3">
                    </div>
                    <div class="form-group">
                        <label>CA (Major Vessels 0-4)</label>
                        <input type="number" id="ca" required placeholder="0-4" min="0" max="4">
                    </div>
                    <div class="form-group">
                        <label>Thal (3: normal, 6: fixed, 7: revers)</label>
                        <input type="number" id="thal" required placeholder="3, 6 or 7" min="3" max="7">
                    </div>
                </div>

                <div style="margin-top: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="saveToDB" checked style="width: auto;">
                    <label for="saveToDB" style="margin-bottom: 0;">Save prediction result for tracking</label>
                </div>

                <div style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem; background: linear-gradient(135deg, var(--secondary), var(--accent));">
                        <i class="bi bi-heart-pulse"></i> Analyze Cardiac Risk
                    </button>
                </div>
            </form>

            <div id="loading" style="display: none; text-align: center; margin-top: 2rem;">
                <div style="width: 40px; height: 40px; border: 4px solid var(--secondary); border-top-color: transparent; border-radius: 50%; display: inline-block; animation: spin 1s linear infinite;"></div>
                <p style="margin-top: 1rem;">Running diagnostic algorithms...</p>
            </div>

            <div id="resultDisplay" class="result-display">
                <i id="resultIcon" class="bi" style="font-size: 4rem; margin-bottom: 1rem; display: block;"></i>
                <h2 id="resultTitle">Cardiac Analysis Result</h2>
                <div style="font-size: 3rem; font-weight: 800; margin: 1rem 0;" id="resultProb">0%</div>
                <p id="resultMessage" style="color: var(--text-muted); line-height: 1.6;"></p>
                <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
                    <button class="btn btn-primary" onclick="window.location.reload()" style="background: linear-gradient(135deg, var(--secondary), var(--accent));">
                        <i class="bi bi-arrow-repeat"></i> New Analysis
                    </button>
                    <button class="btn" style="background: rgba(255, 255, 255, 0.05);" onclick="window.location.href='index.html'">
                        <i class="bi bi-house"></i> Go to Dashboard
                    </button>
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script src="js/api.js"></script>
    <script src="js/heart.js"></script>
</body>
</html>
